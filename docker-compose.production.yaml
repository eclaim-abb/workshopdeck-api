services:
  workshop-deck-api:
    build:
      context: .
    container_name: workshop-deck-api
    ports:
      - "4124:4124"
    env_file:
      - .env
    environment:
      - GIN_MODE=release
    restart: always
    networks:
      - workshopDeckNet
    volumes:
      - ${WORKDIR}/logs:/app/logs
      - ${WORKDIR}/uploads:/app/uploads

networks:
  workshopDeckNet:
    external: true