services:
  workshop-deck-api:
    build:
      context: .
      args:
        UID: 1000
        GID: 1000
        userName: "ginuser"
    container_name: workshop-deck-api
    ports:
      - "4124:4124"
    env_file:
      - .env
    restart: always
    environment:
      - GIN_MODE=release
    networks:
      - workshopDeckNet
    volumes:
      - ${WORKDIR}/logs:/app/logs
      - ${WORKDIR}/uploads:/app/uploads

networks:
  workshopDeckNet:
    external: true